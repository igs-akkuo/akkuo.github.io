<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全新網頁</title>
    <style>
        /* 基礎全域樣式優化 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            color: #333333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        header {
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            color: #0076ff;
            margin: 0;
        }
        main {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.85em;
            color: #888888;
        }
    </style>
</head>
<body>

    <header>
        <h1>歡迎來到我的網站</h1>
    </header>

    <main>
        <h2>頁面核心內容</h2>
        <p>這是一個標準的 HTML5 頁面結構。您可以直接修改此處的文字，或是透過內嵌的 CSS 樣式表來調整視覺外觀。</p>
        <p>現代網頁開發的核心三要素：</p>
        <ul>
            <li><strong>HTML：</strong> 定義網頁的結構與內容。</li>
            <li><strong>CSS：</strong> 負責視覺風格與排版佈局。</li>
            <li><strong>JavaScript：</strong> 處理動態互動與邏輯行為。</li>
        </ul>
    </main>

    <footer>
        <p>&copy; 2026 我的網頁專案. 保留所有權利。</p>
    </footer>

    <script>
        // 頁面動態交互邏輯可在此撰寫
        console.log("HTML 頁面已成功載入完成。");
    </script>
</body>
</html>
